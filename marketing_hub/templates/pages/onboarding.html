{% extends "marketing_hub/templates/marketing_portal_base.html" %}

{% block title %}Welcome to Marketing Hub{% endblock %}

{% block head_include %}
{{ super() }}
<style>
  .onboarding-overlay {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: rgba(0, 0, 0, 0.5);
    backdrop-filter: blur(4px);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 9999;
  }
  
  .onboarding-modal {
    background: white;
    border-radius: 12px;
    max-width: 800px;
    width: 90%;
    max-height: 90vh;
    overflow-y: auto;
    box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
  }
  
  .onboarding-header {
    padding: 2rem;
    border-bottom: 1px solid var(--border-color);
  }
  
  .onboarding-body {
    padding: 2rem;
  }
  
  .onboarding-footer {
    padding: 1.5rem 2rem;
    border-top: 1px solid var(--border-color);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  
  .progress-dots {
    display: flex;
    gap: 0.5rem;
    margin-bottom: 1.5rem;
  }
  
  .progress-dot {
    width: 3rem;
    height: 0.5rem;
    border-radius: 0.25rem;
    background: #e5e7eb;
    transition: all 0.3s;
  }
  
  .progress-dot.active {
    background: var(--primary);
  }
  
  .progress-dot.completed {
    background: var(--primary-light);
  }
  
  .step-icon {
    width: 64px;
    height: 64px;
    border-radius: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 1.5rem;
    font-size: 2rem;
  }
  
  .feature-list {
    list-style: none;
    padding: 0;
    margin: 1.5rem 0;
  }
  
  .feature-item {
    display: flex;
    align-items: start;
    gap: 1rem;
    padding: 1rem;
    border-radius: 8px;
    margin-bottom: 0.75rem;
    background: var(--gray-50);
  }
  
  .feature-icon {
    width: 24px;
    height: 24px;
    border-radius: 50%;
    background: var(--primary);
    color: white;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  
  .action-card {
    border: 1px solid var(--border-color);
    border-radius: 8px;
    padding: 1rem;
    margin-bottom: 0.75rem;
    display: flex;
    align-items: center;
    gap: 1rem;
    cursor: pointer;
    transition: all 0.2s;
  }
  
  .action-card:hover {
    border-color: var(--primary);
    box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
  }
  
  .action-icon {
    width: 40px;
    height: 40px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.25rem;
  }
  
  .btn-group-responsive {
    display: flex;
    gap: 0.5rem;
    flex-wrap: wrap;
  }
  
  @media (max-width: 768px) {
    .onboarding-modal {
      width: 95%;
      max-height: 95vh;
    }
    
    .onboarding-header,
    .onboarding-body,
    .onboarding-footer {
      padding: 1.25rem;
    }
  }
</style>
{% endblock %}

{% block page_content %}
<div id="onboardingOverlay" class="onboarding-overlay" style="display: none;">
  <div class="onboarding-modal">
    <div class="onboarding-header">
      <div class="progress-dots" id="progressDots"></div>
      <div class="text-center">
        <div class="step-icon" id="stepIcon"></div>
        <h2 id="stepTitle"></h2>
        <p class="text-muted" id="stepDescription"></p>
      </div>
    </div>
    
    <div class="onboarding-body" id="stepContent"></div>
    
    <div class="onboarding-footer">
      <button class="btn btn-default" id="backBtn" onclick="previousStep()">
        <svg class="icon icon-sm"><use href="#icon-chevron-left"></use></svg>
        Back
      </button>
      
      <div class="btn-group-responsive">
        <button class="btn btn-default" id="skipBtn" onclick="skipOnboarding()">
          Skip Tour
        </button>
        <button class="btn btn-primary" id="nextBtn" onclick="nextStep()">
          Next
          <svg class="icon icon-sm"><use href="#icon-chevron-right"></use></svg>
        </button>
      </div>
    </div>
  </div>
</div>

<script>
  // Onboarding state
  let currentStep = 0;
  let userMode = '{{ mode }}' || 'agent'; // admin or agent
  
  // Steps configuration
  const adminSteps = [

    {

      iconBg: '#10b981',
      title: 'Your Dashboard',
      description: 'Access key metrics and insights at a glance',
      content: `
        <p class="mb-3">The dashboard provides:</p>
        <ul class="feature-list">
          <li class="feature-item">
            <div class="feature-icon">📈</div>
            <div>

            </div>
          </li>
          <li class="feature-item">
            <div class="feature-icon">💰</div>
            <div>
              <strong>Budget Tracking</strong>
              <p class="text-muted mb-0">Monitor spending across all campaigns</p>
            </div>
          </li>
          <li class="feature-item">
            <div class="feature-icon">🎯</div>
            <div>
              <strong>Lead Generation</strong>
              <p class="text-muted mb-0">Track leads and conversions</p>
            </div>
          </li>
        </ul>
      `
    },
    {
      icon: '🚀',
      iconBg: '#8b5cf6',
      title: 'Create Campaigns',
      description: 'Launch multi-channel marketing campaigns',
      content: `
        <p class="mb-3">You can create campaigns with:</p>
        <div class="action-card">
          <div class="action-icon" style="background: #f3f4f6; color: #6b7280;">📧</div>
          <div>
            <strong>Email Marketing</strong>
            <p class="text-muted mb-0">Send targeted email campaigns</p>
          </div>
        </div>
        <div class="action-card">
          <div class="action-icon" style="background: #f3f4f6; color: #6b7280;">💬</div>
          <div>
            <strong>SMS Campaigns</strong>
            <p class="text-muted mb-0">Reach customers via text</p>
          </div>
        </div>
        <div class="action-card">
          <div class="action-icon" style="background: #f3f4f6; color: #6b7280;">📱</div>
          <div>
            <strong>WhatsApp Business</strong>
            <p class="text-muted mb-0">Connect on WhatsApp</p>
          </div>
        </div>
      `
    },
    {
      icon: '📱',
      iconBg: '#f59e0b',
      title: 'Mobile Access',
      description: 'Manage campaigns on the go',
      content: `
        <p class="mb-3">The portal is fully responsive and mobile-friendly:</p>
        <ul class="feature-list">
          <li class="feature-item">
            <div class="feature-icon">✓</div>
            <div>
              <strong>Real-time Notifications</strong>
              <p class="text-muted mb-0">Get updates on campaign performance</p>
            </div>
          </li>
          <li class="feature-item">
            <div class="feature-icon">✓</div>
            <div>
              <strong>Quick Actions</strong>
              <p class="text-muted mb-0">Approve, pause, or modify campaigns</p>
            </div>
          </li>
          <li class="feature-item">
            <div class="feature-icon">✓</div>
            <div>
              <strong>Offline Support</strong>
              <p class="text-muted mb-0">View cached data even offline</p>
            </div>
          </li>
        </ul>
      `
    },
    {
      icon: '✅',
      iconBg: '#22c55e',
      title: 'You\'re All Set!',
      description: 'Start managing your marketing campaigns',
      content: `
        <p class="mb-3 text-center">Choose an action to get started:</p>
        <a href="/portal/campaigns" class="action-card text-decoration-none">
          <div class="action-icon" style="background: #dbeafe; color: #3b82f6;">🎯</div>
          <div>
            <strong>View Campaigns</strong>
            <p class="text-muted mb-0">See all your marketing campaigns</p>
          </div>
          <svg class="icon icon-sm ml-auto"><use href="#icon-chevron-right"></use></svg>
        </a>
        <a href="/portal/analytics" class="action-card text-decoration-none">
          <div class="action-icon" style="background: #dbeafe; color: #3b82f6;">📊</div>
          <div>
            <strong>View Analytics</strong>
            <p class="text-muted mb-0">Check your campaign performance</p>
          </div>
          <svg class="icon icon-sm ml-auto"><use href="#icon-chevron-right"></use></svg>
        </a>
        <a href="/portal/content" class="action-card text-decoration-none">
          <div class="action-icon" style="background: #dbeafe; color: #3b82f6;">📝</div>
          <div>
            <strong>Manage Content</strong>
            <p class="text-muted mb-0">Review and approve marketing content</p>
          </div>
          <svg class="icon icon-sm ml-auto"><use href="#icon-chevron-right"></use></svg>
        </a>
      `
    }
  ];
  
  const agentSteps = [
    {
      icon: '👋',
      iconBg: '#3b82f6',
      title: 'Welcome to Marketing Hub',
      description: 'Your portal for creating marketing campaigns',
      content: `
        <ul class="feature-list">
          <li class="feature-item">
            <div class="feature-icon">✓</div>
            <div>
              <strong>Create Campaigns</strong>
              <p class="text-muted mb-0">Launch email, SMS, and social campaigns</p>
            </div>
          </li>
          <li class="feature-item">
            <div class="feature-icon">✓</div>
            <div>
              <strong>Track Performance</strong>
              <p class="text-muted mb-0">Monitor campaign results in real-time</p>
            </div>
          </li>
          <li class="feature-item">
            <div class="feature-icon">✓</div>
            <div>
              <strong>Collaborate</strong>
              <p class="text-muted mb-0">Work with your team on content</p>
            </div>
          </li>
        </ul>
      `
    },
    {
      icon: '🎯',
      iconBg: '#10b981',
      title: 'Campaign Creation',
      description: 'Easy steps to launch your campaigns',
      content: `
        <p class="mb-3">Creating a campaign is simple:</p>
        <div class="action-card">
          <div class="action-icon" style="background: #f3f4f6; color: #6b7280;">1️⃣</div>
          <div>
            <strong>Set Campaign Goals</strong>
            <p class="text-muted mb-0">Define your objectives and target audience</p>
          </div>
        </div>
        <div class="action-card">
          <div class="action-icon" style="background: #f3f4f6; color: #6b7280;">2️⃣</div>
          <div>
            <strong>Create Content</strong>
            <p class="text-muted mb-0">Design emails, SMS, or social posts</p>
          </div>
        </div>
        <div class="action-card">
          <div class="action-icon" style="background: #f3f4f6; color: #6b7280;">3️⃣</div>
          <div>
            <strong>Launch & Monitor</strong>
            <p class="text-muted mb-0">Send and track your campaign performance</p>
          </div>
        </div>
      `
    },
    {
      icon: '📊',
      iconBg: '#8b5cf6',
      title: 'Performance Tracking',
      description: 'Monitor your campaign success',
      content: `
        <p class="mb-3">Track important metrics:</p>
        <ul class="feature-list">
          <li class="feature-item">
            <div class="feature-icon">📧</div>
            <div>
              <strong>Email Engagement</strong>
              <p class="text-muted mb-0">Opens, clicks, and conversions</p>
            </div>
          </li>
          <li class="feature-item">
            <div class="feature-icon">💬</div>
            <div>
              <strong>SMS Delivery</strong>
              <p class="text-muted mb-0">Delivery rates and responses</p>
            </div>
          </li>
          <li class="feature-item">
            <div class="feature-icon">🎯</div>
            <div>
              <strong>Lead Generation</strong>
              <p class="text-muted mb-0">New leads and conversions</p>
            </div>
          </li>
        </ul>
      `
    },
    {
      icon: '✅',
      iconBg: '#22c55e',
      title: 'Ready to Start!',
      description: 'Begin creating your first campaign',
      content: `
        <p class="mb-3 text-center">Get started with these quick actions:</p>
        <a href="/portal/campaigns/new" class="action-card text-decoration-none">
          <div class="action-icon" style="background: #dbeafe; color: #3b82f6;">➕</div>
          <div>
            <strong>Create First Campaign</strong>
            <p class="text-muted mb-0">Launch your first marketing campaign</p>
          </div>
          <svg class="icon icon-sm ml-auto"><use href="#icon-chevron-right"></use></svg>
        </a>
        <a href="/portal/campaigns" class="action-card text-decoration-none">
          <div class="action-icon" style="background: #dbeafe; color: #3b82f6;">📋</div>
          <div>
            <strong>View Campaigns</strong>
            <p class="text-muted mb-0">See existing campaigns and templates</p>
          </div>
          <svg class="icon icon-sm ml-auto"><use href="#icon-chevron-right"></use></svg>
        </a>
        <a href="/portal/help" class="action-card text-decoration-none">
          <div class="action-icon" style="background: #dbeafe; color: #3b82f6;">❓</div>
          <div>
            <strong>Get Help</strong>
            <p class="text-muted mb-0">Learn more about features and best practices</p>
          </div>
          <svg class="icon icon-sm ml-auto"><use href="#icon-chevron-right"></use></svg>
        </a>
      `
    }
  ];
  
  const steps = userMode === 'admin' ? adminSteps : agentSteps;
  
  // Check if onboarding should be shown
  function checkOnboardingStatus() {
    frappe.call({
      method: 'frappe.client.get_value',
      args: {
        doctype: 'User',
        filters: { name: frappe.session.user },
        fieldname: 'marketing_hub_portal_onboarding_completed'
      },
      callback: function(r) {
        if (!r.message || !r.message.marketing_hub_portal_onboarding_completed) {
          showOnboarding();
        }
      }
    });
  }
  
  function showOnboarding() {
    document.getElementById('onboardingOverlay').style.display = 'flex';
    renderStep();
  }
  
  function renderStep() {
    const step = steps[currentStep];
    
    // Update progress dots
    const dotsHtml = steps.map((_, index) => {
      let className = 'progress-dot';
      if (index === currentStep) className += ' active';
      else if (index < currentStep) className += ' completed';
      return `<div class="${className}"></div>`;
    }).join('');
    document.getElementById('progressDots').innerHTML = dotsHtml;
    
    // Update step icon
    document.getElementById('stepIcon').innerHTML = step.icon;
    document.getElementById('stepIcon').style.backgroundColor = step.iconBg + '20';
    
    // Update step content
    document.getElementById('stepTitle').textContent = step.title;
    document.getElementById('stepDescription').textContent = step.description;
    document.getElementById('stepContent').innerHTML = step.content;
    
    // Update buttons
    document.getElementById('backBtn').style.display = currentStep > 0 ? 'block' : 'none';
    document.getElementById('skipBtn').style.display = currentStep < steps.length - 1 ? 'block' : 'none';
    
    const nextBtn = document.getElementById('nextBtn');
    if (currentStep === steps.length - 1) {
      nextBtn.innerHTML = 'Get Started <svg class="icon icon-sm"><use href="#icon-arrow-right"></use></svg>';
      nextBtn.onclick = completeOnboarding;
    } else {
      nextBtn.innerHTML = 'Next <svg class="icon icon-sm"><use href="#icon-chevron-right"></use></svg>';
      nextBtn.onclick = nextStep;
    }
  }
  
  function nextStep() {
    if (currentStep < steps.length - 1) {
      currentStep++;
      renderStep();
    }
  }
  
  function previousStep() {
    if (currentStep > 0) {
      currentStep--;
      renderStep();
    }
  }
  
  function skipOnboarding() {
    completeOnboarding();
  }
  
  function completeOnboarding() {
    frappe.call({
      method: 'frappe.client.set_value',
      args: {
        doctype: 'User',
        name: frappe.session.user,
        fieldname: {
          marketing_hub_portal_onboarding_completed: 1
        }
      },
      callback: function() {
        document.getElementById('onboardingOverlay').style.display = 'none';
      }
    });
  }
  
  // Initialize onboarding on page load
  frappe.ready(function() {
    checkOnboardingStatus();
  });
</script>
{% endblock %}
