<div class="portal-sidebar">

                <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>

            Marketing Hub
        </a>
    </div>
    <div class="nav-links">
        <a href="/marketing" class="nav-link {% if pathname == '/marketing' %}active{% endif %}">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">

                <rect x="14" y="3" width="7" height="7"></rect>
                <rect x="14" y="14" width="7" height="7"></rect>
                <rect x="3" y="14" width="7" height="7"></rect>
            </svg>
            Dashboard
        </a>
        <a href="/marketing/campaigns" class="nav-link {% if pathname.startswith('/marketing/campaigns') %}active{% endif %}">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">

                <path d="M22 12A10 10 0 0 0 12 2v10z"></path>
            </svg>

        </a>
        <a href="/marketing/analytics" class="nav-link {% if pathname == '/marketing/analytics' %}active{% endif %}">

    <div style="margin-top: auto; padding: 24px;">
        <div style="font-size: 12px; color: var(--text-light);">
            Logged in as:<br>
            <strong>{{ frappe.session.user }}</strong>
        </div>
    </div>
</div>
