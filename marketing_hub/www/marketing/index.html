{%- block head_include %}{% endblock %}
<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Marketing Hub</title>
  <link rel="icon" type="image/svg+xml" href="/assets/marketing_hub/frontend/favicon.svg" />
  {%- for css in frontend_assets.stylesheets %}
  <link rel="stylesheet" crossorigin href="{{ css }}" />
  {%- endfor %}
  {%- for preload in frontend_assets.modulepreloads %}
  <link rel="modulepreload" crossorigin href="{{ preload }}" />
  {%- endfor %}
</head>

<body>
  <div class="centered splash">
    <img src="{{ splash_image }}" style="max-width: 100px; max-height: 100px;">
  </div>
  <style>
    .centered.splash {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #fff;
      z-index: 9999;
    }
  </style>
  <div id="app"></div>

  <script>
    // Frappe boot data for FrappeUI (socket.io, csrf, session)
    window.csrf_token = "{{ frappe.session.csrf_token }}";
    window.frappe = window.frappe || {};
    window.frappe.csrf_token = window.csrf_token;
    window.frappe.boot = {
      socketio_port: "{{ socketio_port }}",
      csrf_token: window.csrf_token,
      sitename: "{{ sitename }}",
      user: {
        roles: {{ user_roles | tojson }},
      },
    };
    window.frappe.session = {
      user: "{{ frappe.session.user }}",
      user_fullname: "{{ user_fullname }}",
      user_image: "{{ user_image }}",
    };
    window.installed_apps = {{ installed_apps | tojson }};
  </script>

  {%- for script in frontend_assets.scripts %}
  <script type="module" crossorigin src="{{ script }}"></script>
  {%- endfor %}
</body>

</html>
